# =============================================================================
# TELECEL SYSTEM — Nginx (reverse proxy + frontend estático + SSL)
# =============================================================================

user nginx;
worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;
  client_max_body_size 12M;   # uploads de documentos até ~10MB

  # Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1024;

  # Upstream do backend NestJS
  upstream telecel_api {
    server backend:3001;
  }

  # ─── HTTP → redireciona para HTTPS ───
  server {
    listen 80;
    server_name _;

    # Permite o desafio do Let's Encrypt
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
  }

  # ─── HTTPS ───
  server {
    listen 443 ssl;
    server_name _;

    # Certificados (ajuste os caminhos conforme seu provedor / Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend estático (HTML/CSS/JS)
    root /usr/share/nginx/html;
    index index.html;

    # API → backend
    location /api/ {
      proxy_pass         http://telecel_api;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
    }

    # SPA-like fallback para o frontend
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
