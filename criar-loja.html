<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TELECEL — Criar Loja</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <div id="page">
    <div class="page-head">
      <div>
        <h1>Criar Loja</h1>
        <p>Cadastre uma nova loja com marca, setores e endereço. Restrito à administração.</p>
      </div>
      <div class="head-actions">
        <a href="lojas.html" class="btn btn-sm">← Voltar para lojas</a>
      </div>
    </div>

    <div class="alert-box" id="permAlert" style="display:none">
      🔒 Esta área é exclusiva para administradores.
    </div>

    <div id="formWrap">
      <div class="card">
        <div class="card-head"><h3>Dados da Loja</h3></div>
        <form id="storeForm">
          <div class="form-grid">
            <label>Nome da loja *<input id="s-name" placeholder="Ex: TIM Planaltina" required /></label>
            <label>Código interno *<input id="s-code" placeholder="Ex: TIM-PLAN-DF" required /></label>
            <label>Marca *
              <select id="s-brand" required>
                <option value="TIM">TIM</option>
                <option value="MOTOROLA">Motorola</option>
                <option value="SAMSUNG">Samsung</option>
              </select>
            </label>
            <label>Telefone<input id="s-phone" placeholder="(00) 0000-0000" /></label>
          </div>

          <div class="field-block">
            <span class="field-label">Setores que a loja opera *</span>
            <div class="checkbox-row">
              <label class="chk"><input type="checkbox" value="VENDAS" checked /> Vendas</label>
              <label class="chk"><input type="checkbox" value="ESTOQUE" /> Estoque</label>
              <label class="chk"><input type="checkbox" value="RH" /> RH</label>
              <label class="chk"><input type="checkbox" value="FINANCEIRO" /> Financeiro</label>
              <label class="chk"><input type="checkbox" value="GERENCIA" /> Gerência</label>
            </div>
          </div>
        </form>
      </div>

      <div class="card" style="margin-top:22px">
        <div class="card-head"><h3>Endereço</h3></div>
        <div class="form-grid">
          <label>CEP<input id="s-zip" placeholder="00000-000" /></label>
          <label>Rua<input id="s-street" placeholder="Av. Principal" /></label>
          <label>Número<input id="s-number" placeholder="123" /></label>
          <label>Complemento<input id="s-complement" placeholder="Sala / Loja" /></label>
          <label>Bairro<input id="s-district" placeholder="Centro" /></label>
          <label>Cidade<input id="s-city" placeholder="Planaltina" /></label>
          <label>Estado (UF)<input id="s-state" placeholder="DF" maxlength="2" /></label>
          <label>E-mail<input id="s-email" type="email" placeholder="loja@telecel.com.br" /></label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" id="btnCancel">Cancelar</button>
          <button type="button" class="btn btn-primary" id="btnSave">Criar loja</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/shell.js"></script>
  <script>TC.mountShell('stores');</script>
  <script>
    var currentRole = (window.TC_USER && window.TC_USER.role) || 'ADMIN';
    if (currentRole !== 'ADMIN') {
      document.getElementById('permAlert').style.display = 'block';
      document.getElementById('formWrap').style.display = 'none';
    }

    document.getElementById('btnCancel').addEventListener('click', function () { window.location.href = 'lojas.html'; });

    document.getElementById('btnSave').addEventListener('click', function () {
      var name = document.getElementById('s-name').value.trim();
      var code = document.getElementById('s-code').value.trim();
      var brand = document.getElementById('s-brand').value;
      var sectors = Array.prototype.slice.call(document.querySelectorAll('.checkbox-row input:checked')).map(function (c) { return c.value; });

      if (!name || !code) { (window.tcToast||alert)('Informe nome e código da loja.', 'error'); return; }
      if (!sectors.length) { (window.tcToast||alert)('Selecione ao menos um setor.', 'error'); return; }

      // No sistema real: POST /api/v1/stores { name, code, brand, sectors, endereço... }
      (window.tcToast||alert)('Loja "' + name + '" (' + brand + ') criada com ' + sectors.length + ' setor(es).', 'success');
      setTimeout(function () { window.location.href = 'lojas.html'; }, 1200);
    });
  </script>
</body>
</html>
