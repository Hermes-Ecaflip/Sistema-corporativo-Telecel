<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TELECEL System — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>
  <main class="auth-shell">
    <!-- ============ ESQUERDA: FORMULÁRIO ============ -->
    <section class="form-side">
      <div class="form-wrap">
        <!-- LOGO OFICIAL TELECEL (SVG) -->
        <div class="logo">
          <svg class="logo-svg" viewBox="0 0 320 230" role="img" aria-label="Grupo Telecel">
            <!-- Anel duplo em espiral -->
            <g class="logo-ring">
              <path d="M150 25 A78 78 0 1 1 72 103" fill="none" stroke="#d4d4d4" stroke-width="20" stroke-linecap="round"/>
              <path d="M150 70 A45 45 0 1 0 195 115" fill="none" stroke="#d4d4d4" stroke-width="20" stroke-linecap="round"/>
            </g>
            <!-- Texto -->
            <text x="8" y="100" class="logo-grupo">GRUPO</text>
            <text x="2" y="170" class="logo-telecel">TELECEL</text>
          </svg>
        </div>

        <header class="head">
          <h1>Bem-vindo(a)! <span class="wave">👋</span></h1>
          <p>Acesse sua conta para continuar</p>
        </header>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="seu@email.com.br" autocomplete="email" required />
            <small class="field-error" data-for="email"></small>
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <div class="input-affix">
              <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
              <button type="button" class="affix-btn" id="toggle-pass" aria-label="Mostrar senha">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <small class="field-error" data-for="password"></small>
          </div>

          <div class="row-between">
            <label class="checkbox">
              <input type="checkbox" id="remember" />
              <span>Lembrar de mim</span>
            </label>
            <a href="#" class="link-accent" id="forgot-link">Esqueci minha senha</a>
          </div>

          <button type="submit" class="btn-primary" id="login-submit">
            <span class="btn-label">Entrar</span>
            <span class="spinner" hidden></span>
          </button>
        </form>

        <footer class="foot">
          <p class="muted">Segurança e tecnologia para você vender mais.</p>
          <p class="partner">Sistema de gestão integrada — Grupo Telecel</p>
          <p class="copyright">© 2026 Grupo Telecel. Todos os direitos reservados.</p>
        </footer>
      </div>
    </section>

    <!-- ============ DIREITA: ARTE ============ -->
    <aside class="art-side" aria-hidden="true">
      <div class="art-overlay"></div>
      <div class="art-tower">
        <svg viewBox="0 0 200 320" width="200" height="320" fill="none">
          <path d="M100 10 L130 300 L70 300 Z" stroke="rgba(255,255,255,.9)" stroke-width="3"/>
          <path d="M100 10 L100 300" stroke="rgba(255,255,255,.55)" stroke-width="2"/>
          <path d="M82 70 H118 M78 110 H122 M74 150 H126 M70 190 H130 M66 230 H134" stroke="rgba(255,255,255,.65)" stroke-width="2"/>
          <path d="M100 10 L100 -10 M92 0 L108 0" stroke="rgba(255,255,255,.9)" stroke-width="3"/>
          <circle cx="100" cy="55" r="22" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
          <circle cx="100" cy="55" r="38" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
          <circle cx="100" cy="55" r="54" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
        </svg>
      </div>
    </aside>
  </main>

  <div class="toast" id="toast" hidden></div>
  <script src="assets/js/login.js"></script>
</body>
</html>
