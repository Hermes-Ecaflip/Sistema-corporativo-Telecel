# =============================================================================
# TELECEL SYSTEM — Prometheus
# Coleta métricas do backend NestJS e dos serviços de infraestrutura.
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'telecel-monitor'

scrape_configs:
  # Backend NestJS (expõe /metrics via prom-client)
  - job_name: 'telecel-backend'
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ['backend:3001']
        labels:
          service: 'api'

  # O próprio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
