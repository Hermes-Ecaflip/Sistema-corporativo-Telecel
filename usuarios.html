<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TELECEL — Usuários</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <div id="page">
    <div class="page-head">
      <div>
        <h1>Usuários</h1>
        <p>Gerencie os usuários do sistema.</p>
      </div>
      <div class="head-actions">
        <button class="btn" id="btnFilter"></button>
        <button class="btn btn-primary" id="btnNew"></button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Usuário</th><th>E-mail</th><th>Perfil</th><th>Loja</th><th>Status</th><th>Último Acesso</th><th>Ações</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="info">Mostrando 1 a 5 de 56 usuários</span>
        <div class="pages">
          <button class="page-btn" disabled>‹</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">…</button>
          <button class="page-btn">12</button>
          <button class="page-btn">›</button>
        </div>
      </div>
    </div>

    <!-- Modal de edição -->
    <div class="modal-overlay" id="modalOverlay"></div>
  </div>

  <script src="assets/js/shell.js"></script>
  <script>
    TC.mountShell('users');
    document.getElementById('btnFilter').innerHTML = tcIcon('filter') + ' Filtros';
    var btnNew = document.getElementById('btnNew');
    btnNew.innerHTML = tcIcon('plus') + ' Novo Usuário';
    btnNew.addEventListener('click', function () { window.location.href = 'cadastro-usuario.html'; });

    const users = [
      { name: 'Admin', email: 'admin@telecel.com.br', role: 'ADMIN', sector: 'GERENCIA', store: 'TIM-PLAN-DF', status: 'Ativo', last: '20/05/2026 14:32' },
      { name: 'Carlos Gerente', email: 'gerente@telecel.com.br', role: 'GERENTE', sector: 'GERENCIA', store: 'TIM-PLAN-DF', status: 'Ativo', last: '20/05/2026 14:31' },
      { name: 'Paulo Supervisor', email: 'supervisor@telecel.com.br', role: 'SUPERVISOR', sector: 'VENDAS', store: 'TIM-JK-DF', status: 'Ativo', last: '20/05/2026 14:30' },
      { name: 'Vanessa Vendedora', email: 'vendedor@telecel.com.br', role: 'VENDEDOR', sector: 'VENDAS', store: 'TIM-PLAN-DF', status: 'Ativo', last: '20/05/2026 14:25' },
      { name: 'Rafael Estoquista', email: 'estoque@telecel.com.br', role: 'ESTOQUISTA', sector: 'ESTOQUE', store: 'TIM-PLAN-DF', status: 'Ativo', last: '20/05/2026 14:22' },
      { name: 'Juliana RH', email: 'rh@telecel.com.br', role: 'RH', sector: 'RH', store: 'MOTO-SP-001', status: 'Ativo', last: '20/05/2026 14:20' },
      { name: 'Fernando Financeiro', email: 'financeiro@telecel.com.br', role: 'FINANCEIRO', sector: 'FINANCEIRO', store: 'MOTO-SP-001', status: 'Ativo', last: '20/05/2026 14:18' },
      { name: 'Auditoria Interna', email: 'auditor@telecel.com.br', role: 'AUDITOR', sector: 'GERENCIA', store: 'SAM-MG-001', status: 'Ativo', last: '20/05/2026 14:15' },
    ];

    // Lojas (código → nome + marca)
    const STORES = {
      'TIM-PLAN-DF': { name: 'TIM Planaltina — DF', brand: 'TIM' },
      'TIM-JK-DF': { name: 'TIM JK Shopping — DF', brand: 'TIM' },
      'TIM-CRB-MS': { name: 'TIM Corumbá — MS', brand: 'TIM' },
      'MOTO-SP-001': { name: 'Motorola Paulista — SP', brand: 'MOTOROLA' },
      'MOTO-RJ-001': { name: 'Motorola Barra — RJ', brand: 'MOTOROLA' },
      'SAM-MG-001': { name: 'Samsung BH Shopping — MG', brand: 'SAMSUNG' },
      'SAM-DF-001': { name: 'Samsung Brasília — DF', brand: 'SAMSUNG' },
    };
    const brandBadge = { 'TIM': 'badge-blue', 'MOTOROLA': 'badge-amber', 'SAMSUNG': 'badge-gray' };
    const roleLabel = { ADMIN:'Administrador', GERENTE:'Gerente', SUPERVISOR:'Supervisor', VENDEDOR:'Vendedor', ESTOQUISTA:'Estoquista', RH:'RH', FINANCEIRO:'Financeiro', AUDITOR:'Auditor' };
    const sectorLabel = { VENDAS:'Vendas', ESTOQUE:'Estoque', RH:'RH', FINANCEIRO:'Financeiro', GERENCIA:'Gerência' };
    const roleBadge = {
      ADMIN: 'badge-red', GERENTE: 'badge-blue', SUPERVISOR: 'badge-blue',
      VENDEDOR: 'badge-green', ESTOQUISTA: 'badge-amber', RH: 'badge-gray',
      FINANCEIRO: 'badge-amber', AUDITOR: 'badge-gray',
    };

    function renderUsers() {
      document.getElementById('rows').innerHTML = users.map((u, idx) => {
        var st = STORES[u.store] || { name: u.store, brand: '' };
        return `
        <tr>
          <td><div style="display:flex;align-items:center;gap:10px">
            <div class="rank-av">${u.name.slice(0,2).toUpperCase()}</div>
            <span class="cell-strong">${u.name}</span>
          </div></td>
          <td class="cell-muted">${u.email}</td>
          <td><span class="badge ${roleBadge[u.role]||'badge-gray'}">${roleLabel[u.role]||u.role}</span></td>
          <td class="cell-muted">
            ${st.brand ? '<span class="badge '+(brandBadge[st.brand]||'badge-gray')+'" style="margin-right:6px">'+st.brand+'</span>' : ''}
            ${st.name}
          </td>
          <td><span class="badge ${u.status==='Ativo'?'badge-green':'badge-gray'}">${u.status}</span></td>
          <td class="cell-muted">${u.last}</td>
          <td>
            <div class="row-actions">
              <button class="act" title="Editar" data-edit="${idx}">${tcIcon('edit')}</button>
              <button class="act" title="${u.status==='Ativo'?'Suspender':'Ativar'}" data-toggle="${idx}">${tcIcon('more')}</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }
    renderUsers();

    // ════════════════ EDIÇÃO DE FUNCIONÁRIO ════════════════
    var overlay = document.getElementById('modalOverlay');
    function closeModal() { overlay.classList.remove('show'); overlay.innerHTML = ''; }
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });

    function storeOptions(selected) {
      var groups = { TIM: [], MOTOROLA: [], SAMSUNG: [] };
      Object.keys(STORES).forEach(function (code) {
        var s = STORES[code];
        var sel = code === selected ? ' selected' : '';
        groups[s.brand].push('<option value="' + code + '"' + sel + '>' + s.name + '</option>');
      });
      return Object.keys(groups).map(function (b) { return '<optgroup label="' + b + '">' + groups[b].join('') + '</optgroup>'; }).join('');
    }
    function selOptions(map, selected) {
      return Object.keys(map).map(function (k) { return '<option value="' + k + '"' + (k === selected ? ' selected' : '') + '>' + map[k] + '</option>'; }).join('');
    }

    document.addEventListener('click', function (e) {
      var be = e.target.closest('[data-edit]');
      var bt = e.target.closest('[data-toggle]');
      if (be) openEdit(+be.dataset.edit);
      if (bt) {
        var u = users[+bt.dataset.toggle];
        u.status = u.status === 'Ativo' ? 'Suspenso' : 'Ativo';
        renderUsers();
        (window.tcToast||alert)(u.name + ' agora está ' + u.status + '.', 'success');
      }
    });

    function openEdit(idx) {
      var u = users[idx];
      overlay.innerHTML = '<div class="modal">' +
        '<h3>Editar Funcionário</h3>' +
        '<p class="hint">' + u.name + ' — ' + u.email + '</p>' +
        '<div class="form-grid">' +
          '<label class="full">Loja *<select id="e-store">' + storeOptions(u.store) + '</select></label>' +
          '<label>Setor *<select id="e-sector">' + selOptions(sectorLabel, u.sector) + '</select></label>' +
          '<label>Cargo *<select id="e-role">' + selOptions(roleLabel, u.role) + '</select></label>' +
          '<label class="full">Status<select id="e-status"><option value="Ativo"' + (u.status==='Ativo'?' selected':'') + '>Ativo</option><option value="Suspenso"' + (u.status==='Suspenso'?' selected':'') + '>Suspenso</option></select></label>' +
        '</div>' +
        '<div class="form-actions"><button class="btn" id="e-cancel">Cancelar</button><button class="btn btn-primary" id="e-save">Salvar alterações</button></div>' +
      '</div>';
      overlay.classList.add('show');
      document.getElementById('e-cancel').addEventListener('click', closeModal);
      document.getElementById('e-save').addEventListener('click', function () {
        u.store = document.getElementById('e-store').value;
        u.sector = document.getElementById('e-sector').value;
        u.role = document.getElementById('e-role').value;
        u.status = document.getElementById('e-status').value;
        // No sistema real: PATCH /api/v1/users/:id { storeId, sector, role, status }
        closeModal(); renderUsers();
        (window.tcToast||alert)('Dados de ' + u.name + ' atualizados (loja, setor e cargo).', 'success');
      });
    }
  </script>
</body>
</html>
