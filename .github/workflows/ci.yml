name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend — Lint, Build, Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: telecel
          POSTGRES_PASSWORD: telecel
          POSTGRES_DB: telecel_test
        ports: [ '5432:5432' ]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: [ '6379:6379' ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        working-directory: backend
        run: npm install

      - name: Gerar Prisma Client
        working-directory: backend
        run: npx prisma generate

      - name: Aplicar migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://telecel:telecel@localhost:5432/telecel_test
        run: npx prisma migrate deploy

      - name: Lint
        working-directory: backend
        run: npm run lint --if-present

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Testes
        working-directory: backend
        env:
          DATABASE_URL: postgresql://telecel:telecel@localhost:5432/telecel_test
          JWT_SECRET: test_secret_com_pelo_menos_32_caracteres_aqui
          JWT_REFRESH_SECRET: test_refresh_secret_com_32_caracteres_ok
        run: npm run test --if-present
