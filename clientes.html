<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TELECEL — Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body>
  <div id="page">
    <div class="page-head">
      <div>
        <h1>Clientes</h1>
        <p>Gerencie e visualize seus clientes.</p>
      </div>
      <div class="head-actions">
        <button class="btn" id="btnExport"></button>
        <button class="btn btn-primary" id="btnNew"></button>
      </div>
    </div>

    <div class="card">
      <div class="filter-bar">
        <div class="search-mini" id="searchBox"></div>
        <button class="btn btn-sm" id="btnFilter"></button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Cliente</th><th>CPF/CNPJ</th><th>Tipo</th><th>Cidade</th>
              <th>Score</th><th>Status</th><th>Ações</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="pagination">
        <span class="info">Mostrando 1 a 6 de 2.456 clientes</span>
        <div class="pages">
          <button class="page-btn" disabled>‹</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <button class="page-btn">…</button>
          <button class="page-btn">410</button>
          <button class="page-btn">›</button>
        </div>
      </div>
    </div>

    <!-- Modal de novo cliente -->
    <div class="modal-overlay" id="modalOverlay"></div>
  </div>

  <script src="assets/js/shell.js"></script>
  <script>
    TC.mountShell('clients');

    document.getElementById('btnExport').innerHTML = tcIcon('download') + ' Exportar';
    document.getElementById('btnNew').innerHTML = tcIcon('plus') + ' Novo Cliente';
    document.getElementById('btnFilter').innerHTML = tcIcon('filter') + ' Filtros';

    // Interações
    document.getElementById('btnExport').addEventListener('click', function () {
      (window.tcToast || alert)('Exportando lista de clientes para CSV...', 'success');
    });
    document.getElementById('btnNew').addEventListener('click', openNewClient);
    document.getElementById('btnFilter').addEventListener('click', function () {
      (window.tcToast || alert)('Filtros avançados em breve.');
    });
    document.getElementById('searchBox').innerHTML = tcIcon('search') + '<input type="text" placeholder="Buscar clientes...">';

    const clients = [
      { name: 'João da Silva', doc: '123.456.789-00', type: 'Pessoa Física', city: 'São Paulo - SP', score: 850, status: 'Ativo' },
      { name: 'Maria Santos', doc: '987.654.321-00', type: 'Pessoa Física', city: 'Rio de Janeiro - RJ', score: 720, status: 'Ativo' },
      { name: 'Empresa XYZ Ltda', doc: '12.345.678/0001-00', type: 'Pessoa Jurídica', city: 'Belo Horizonte - MG', score: 910, status: 'Ativo' },
      { name: 'Carlos Almeida', doc: '456.789.123-00', type: 'Pessoa Física', city: 'Curitiba - PR', score: 680, status: 'Ativo' },
      { name: 'Ana Pereira', doc: '654.987.321-00', type: 'Pessoa Física', city: 'Salvador - BA', score: 900, status: 'Ativo' },
      { name: 'Tecno Company Ltda', doc: '98.765.432/0001-10', type: 'Pessoa Jurídica', city: 'Fortaleza - CE', score: 430, status: 'Risco' },
    ];

    function scoreColor(s) { return s >= 700 ? '#137a3f' : s >= 500 ? '#b7791f' : '#cf222e'; }
    function statusBadge(s) {
      if (s === 'Ativo') return '<span class="badge badge-green">Ativo</span>';
      if (s === 'Risco') return '<span class="badge badge-red">Risco</span>';
      return '<span class="badge badge-gray">'+s+'</span>';
    }
    function typeBadge(t) {
      return t.includes('Jurídica')
        ? '<span class="cell-muted">'+t+'</span>'
        : '<span class="cell-muted">'+t+'</span>';
    }

    // ════════════════ FORMULÁRIO DE NOVO CLIENTE ════════════════
    function renderRows() {
      document.getElementById('rows').innerHTML = clients.map((c, idx) => `
        <tr>
          <td class="cell-strong">${c.name}</td>
          <td class="cell-muted">${c.doc}</td>
          <td>${typeBadge(c.type)}</td>
          <td>${c.city}</td>
          <td>
            <span class="score">
              <span class="score-bar"><span style="width:${c.score/10}%;background:${scoreColor(c.score)}"></span></span>
              <span class="score-num" style="color:${scoreColor(c.score)}">${c.score}</span>
            </span>
          </td>
          <td>${statusBadge(c.status)}</td>
          <td>
            <div class="row-actions">
              <button class="act" title="Ver" data-view="${idx}">${tcIcon('eye')}</button>
              <button class="act" title="Editar" data-edit="${idx}">${tcIcon('edit')}</button>
              <button class="act" title="Excluir" data-del="${idx}">${tcIcon('more')}</button>
            </div>
          </td>
        </tr>`).join('');
    }

    var overlay = document.getElementById('modalOverlay');
    function closeModal() { overlay.classList.remove('show'); overlay.innerHTML = ''; }
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });

    // ── Ações da linha: ver, editar, excluir ──
    document.addEventListener('click', function (e) {
      var bv = e.target.closest('[data-view]');
      var be = e.target.closest('[data-edit]');
      var bd = e.target.closest('[data-del]');
      if (bv) openViewClient(+bv.dataset.view);
      if (be) openEditClient(+be.dataset.edit);
      if (bd) openDeleteClient(+bd.dataset.del);
    });

    function openViewClient(idx) {
      var c = clients[idx];
      overlay.innerHTML = '<div class="modal">' +
        '<h3>Detalhes do Cliente</h3>' +
        '<div class="detail-list">' +
          '<div class="detail-row"><span>Nome</span><strong>' + c.name + '</strong></div>' +
          '<div class="detail-row"><span>Documento</span><strong>' + c.doc + '</strong></div>' +
          '<div class="detail-row"><span>Tipo</span><strong>' + c.type + '</strong></div>' +
          '<div class="detail-row"><span>Cidade</span><strong>' + c.city + '</strong></div>' +
          '<div class="detail-row"><span>Score</span><strong style="color:' + scoreColor(c.score) + '">' + c.score + '</strong></div>' +
          '<div class="detail-row"><span>Status</span><strong>' + c.status + '</strong></div>' +
        '</div>' +
        '<div class="form-actions"><button class="btn btn-primary" id="v-close">Fechar</button></div>' +
      '</div>';
      overlay.classList.add('show');
      document.getElementById('v-close').addEventListener('click', closeModal);
    }

    function openEditClient(idx) {
      var c = clients[idx];
      overlay.innerHTML = '<div class="modal">' +
        '<h3>Editar Cliente</h3>' +
        '<div class="form-grid">' +
          '<label class="full">Nome / Razão Social *<input id="ec-name" value="' + c.name.replace(/"/g, '&quot;') + '" /></label>' +
          '<label>Cidade<input id="ec-city" value="' + c.city.replace(/"/g, '&quot;') + '" /></label>' +
          '<label>Status<select id="ec-status">' +
            '<option' + (c.status==='Ativo'?' selected':'') + '>Ativo</option>' +
            '<option' + (c.status==='Inativo'?' selected':'') + '>Inativo</option>' +
            '<option' + (c.status==='Risco'?' selected':'') + '>Risco</option>' +
          '</select></label>' +
        '</div>' +
        '<div class="form-actions"><button class="btn" id="ec-cancel">Cancelar</button><button class="btn btn-primary" id="ec-save">Salvar</button></div>' +
      '</div>';
      overlay.classList.add('show');
      document.getElementById('ec-cancel').addEventListener('click', closeModal);
      document.getElementById('ec-save').addEventListener('click', function () {
        var name = document.getElementById('ec-name').value.trim();
        if (!name) { (window.tcToast||alert)('Informe o nome.', 'error'); return; }
        c.name = name;
        c.city = document.getElementById('ec-city').value.trim() || '—';
        c.status = document.getElementById('ec-status').value;
        // No sistema real: PATCH /api/v1/clients/:id
        closeModal(); renderRows();
        (window.tcToast||alert)('Cliente "' + name + '" atualizado.', 'success');
      });
    }

    function openDeleteClient(idx) {
      var c = clients[idx];
      overlay.innerHTML = '<div class="modal">' +
        '<h3>Excluir Cliente</h3>' +
        '<p style="font-size:14px;line-height:1.6;color:var(--ink,#1f2430)">Tem certeza que deseja excluir <strong>' + c.name + '</strong>? Esta ação não pode ser desfeita.</p>' +
        '<div class="form-actions"><button class="btn" id="d-cancel">Cancelar</button><button class="btn btn-danger" id="d-confirm">Excluir</button></div>' +
      '</div>';
      overlay.classList.add('show');
      document.getElementById('d-cancel').addEventListener('click', closeModal);
      document.getElementById('d-confirm').addEventListener('click', function () {
        var name = c.name;
        clients.splice(idx, 1);
        // No sistema real: DELETE /api/v1/clients/:id (soft delete)
        closeModal(); renderRows();
        (window.tcToast||alert)('Cliente "' + name + '" excluído.', 'success');
      });
    }

    // Validação de CPF (dígitos verificadores)
    function isValidCPF(cpf) {
      cpf = (cpf || '').replace(/\D/g, '');
      if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
      var s = 0;
      for (var i = 0; i < 9; i++) s += parseInt(cpf[i]) * (10 - i);
      var d1 = 11 - (s % 11); if (d1 >= 10) d1 = 0;
      if (d1 !== parseInt(cpf[9])) return false;
      s = 0;
      for (var j = 0; j < 10; j++) s += parseInt(cpf[j]) * (11 - j);
      var d2 = 11 - (s % 11); if (d2 >= 10) d2 = 0;
      return d2 === parseInt(cpf[10]);
    }
    // Validação de CNPJ
    function isValidCNPJ(cnpj) {
      cnpj = (cnpj || '').replace(/\D/g, '');
      if (cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
      var calc = function (base) {
        var nums = cnpj.substring(0, base);
        var sum = 0, pos = base - 7;
        for (var i = base; i >= 1; i--) { sum += nums[base - i] * pos--; if (pos < 2) pos = 9; }
        var r = sum % 11;
        return r < 2 ? 0 : 11 - r;
      };
      return calc(12) === parseInt(cnpj[12]) && calc(13) === parseInt(cnpj[13]);
    }

    function openNewClient() {
      overlay.innerHTML = '<div class="modal">' +
        '<h3>Novo Cliente</h3>' +
        '<div class="form-grid">' +
          '<label>Tipo de pessoa *<select id="c-type">' +
            '<option value="PF">Pessoa Física</option>' +
            '<option value="PJ">Pessoa Jurídica</option>' +
          '</select></label>' +
          '<label id="c-doc-wrap">CPF *<input id="c-doc" placeholder="000.000.000-00" /></label>' +
          '<label class="full">Nome / Razão Social *<input id="c-name" placeholder="Nome completo" /></label>' +
          '<label>E-mail<input id="c-email" type="email" placeholder="cliente@email.com" /></label>' +
          '<label>Telefone<input id="c-phone" placeholder="(00) 00000-0000" /></label>' +
          '<label>Cidade<input id="c-city" placeholder="São Paulo" /></label>' +
          '<label>Estado<input id="c-state" placeholder="SP" maxlength="2" /></label>' +
        '</div>' +
        '<div class="form-actions"><button class="btn" id="c-cancel">Cancelar</button><button class="btn btn-primary" id="c-save">Cadastrar cliente</button></div>' +
      '</div>';
      overlay.classList.add('show');

      // alterna rótulo CPF/CNPJ conforme tipo
      document.getElementById('c-type').addEventListener('change', function (e) {
        var isPJ = e.target.value === 'PJ';
        document.getElementById('c-doc-wrap').childNodes[0].textContent = isPJ ? 'CNPJ *' : 'CPF *';
        document.getElementById('c-doc').placeholder = isPJ ? '00.000.000/0000-00' : '000.000.000-00';
      });

      document.getElementById('c-cancel').addEventListener('click', closeModal);
      document.getElementById('c-save').addEventListener('click', function () {
        var type = document.getElementById('c-type').value;
        var name = document.getElementById('c-name').value.trim();
        var doc = document.getElementById('c-doc').value.trim();
        var city = document.getElementById('c-city').value.trim();
        var state = document.getElementById('c-state').value.trim().toUpperCase();

        if (!name) { (window.tcToast||alert)('Informe o nome do cliente.', 'error'); return; }
        if (type === 'PF' && !isValidCPF(doc)) { (window.tcToast||alert)('CPF inválido.', 'error'); return; }
        if (type === 'PJ' && !isValidCNPJ(doc)) { (window.tcToast||alert)('CNPJ inválido.', 'error'); return; }

        // No sistema real: POST /api/v1/clients { name, document, personType, city, state, ... }
        clients.unshift({
          name: name, doc: doc,
          type: type === 'PJ' ? 'Pessoa Jurídica' : 'Pessoa Física',
          city: (city || '—') + (state ? ' - ' + state : ''),
          score: 0, status: 'Ativo',
        });
        closeModal(); renderRows();
        (window.tcToast||alert)('Cliente "' + name + '" cadastrado com sucesso.', 'success');
      });
    }

    // Render inicial da tabela
    renderRows();
  </script>
</body>
</html>
